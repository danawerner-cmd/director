<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El Director</title>

<style>
body{
margin:0;
background:#0b0b0f;
color:#e8e8e8;
font-family: sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

#app{width:90%;max-width:500px}

.text{font-size:20px;line-height:1.6}

button{
margin-top:30px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#ffffff20;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div id="app">
<div class="text">El Director ya está aquí.</div>
<button onclick="start()">Entrar</button>
</div>

<script>

const interventions=[
"El Director considera que esta noche recién comienza.",
"Durante los próximos segundos, el resto deja de importar.",
"El Director no tiene apuro.",
"Algunas miradas duran más de lo necesario.",
"Hoy no vinieron a comportarse como desconocidos.",
"El Director sugiere no pensar demasiado.",
"El silencio también es una intervención válida.",
"El Director nota que siguen aquí.",
"Esto ya cambió.",
"Lo que viene depende de ustedes."
];

let i=0;

function start(){
document.getElementById("app").innerHTML=
`<div class="text">${interventions[i]}</div>
<button onclick="next()">Continuar</button>`;
}

function next(){
i++;
if(i>=interventions.length){
document.getElementById("app").innerHTML=
`<div class="text">El Director ya no habla.</div>
<button onclick="location.reload()">Cerrar</button>`;
return;
}
document.querySelector(".text").innerHTML=interventions[i];
}

</script>

</body>
</html>
