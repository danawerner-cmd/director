<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El Director</title>

<style>
body{
margin:0;
background:#0b0b0f;
color:#e8e8e8;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

#app{
width:90%;
max-width:500px;
}

h1{
font-weight:300;
letter-spacing:2px;
font-size:22px;
margin-bottom:40px;
opacity:0.8;
}

.text{
font-size:20px;
line-height:1.6;
min-height:120px;
}

button{
margin-top:30px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#ffffff15;
color:#fff;
font-size:16px;
}
</style>
</head>

<body>

<div id="app">
<h1>El Director</h1>

<div class="text">
El Director ya está acá.
</div>

<button onclick="start()">Entrar</button>
</div>

<script>

const interventions = [
"El Director siente que esta noche recién empieza.",
"En los próximos segundos, lo de afuera no importa.",
"El Director no tiene apuro… ninguno.",
"A veces una mirada dura más de lo que debería.",
"Hoy no están actuando como desconocidos.",
"No hace falta pensar tanto.",
"Hay cosas que se entienden sin explicarlas.",
"El silencio también juega su parte.",
"El Director nota que ya se dieron cuenta de algo.",
"Por favor, no miren el teléfono por un momento.",
"Si alguien sonríe ahora, cambia todo.",
"El Director no repite las cosas.",
"Lo que están sintiendo no necesita explicación.",
"Siguen acá… interesante.",
"Esto ya no es tan inocente como al principio.",
"El Director no interrumpe porque sí.",
"Algo entre ustedes ya se movió.",
"No hace falta resistirse tanto.",
"Lo que pase después, ya es decisión de ustedes.",
"El Director se corre un segundo."
];

let i = 0;

function start(){
document.getElementById("app").innerHTML = `
<div class="text">${interventions[i]}</div>
<button onclick="next()">Seguir</button>
`;
}

function next(){
i++;

if(i >= interventions.length){
document.getElementById("app").innerHTML = `
<div class="text">
El Director ya no dice nada.<br><br>
Lo que pase ahora, ya es entre ustedes.
</div>
<button onclick="location.reload()">Cerrar</button>
`;
return;
}

document.querySelector(".text").innerHTML = interventions[i];
}

</script>

</body>
</html>
